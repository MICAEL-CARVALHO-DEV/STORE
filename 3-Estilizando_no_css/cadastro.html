<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro - 7STORE</title>
</head>

<body class="auth-page-body">

    <div class="auth-container">
        <h2>Criar Conta na 7STORE</h2>
        <form>
            <div class="form-group">
                <label for="register-name">Nome Completo</label>
                <input type="text" id="register-name" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="form-group">
                <label for="register-password">Senha</label>
                <input type="password" id="register-password" placeholder="Crie uma senha forte" required>
            </div>
            <button type="submit" class="form-btn">Criar Conta</button>
            <p class="form-switch-text">
                Já tem uma conta? <a href="login.html">Faça Login</a>
            </p>
        </form>
    </div>

</body>

</html>
