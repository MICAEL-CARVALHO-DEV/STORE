<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> <title>Login - 7STORE</title>
</head>
<body class="auth-page-body">

    <div class="auth-container">
        <h2>Entrar na 7STORE</h2>
        <form>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="form-btn">Entrar</button>
            <p class="form-switch-text">
                Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
            </p>
        </form>
    </div>

</body>
</html>
